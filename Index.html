<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Your Brand Name</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #111;
      color: #fff;
      text-align: center;
    }

    header {
      padding: 40px;
      background: #000;
    }

    h1 {
      margin: 0;
    }

    .socials a {
      margin: 10px;
      display: inline-block;
      color: #fff;
      text-decoration: none;
      font-size: 18px;
    }

    .section {
      padding: 40px 20px;
    }

    iframe {
      border: none;
      width: 100%;
      max-width: 500px;
      height: 600px;
    }

    footer {
      padding: 20px;
      background: #000;
      font-size: 14px;
    }
  </style>
</head>

<body>

<header>
  <h1>Your Brand</h1>
  <p>Welcome to our official site</p>
</header>

<div class="section">
  <h2>Follow Us</h2>
  <div class="socials">
    <a href="https://facebook.com/YOURPAGE" target="_blank">Facebook</a>
    <a href="https://instagram.com/YOURPAGE" target="_blank">Instagram</a>
    <a href="https://tiktok.com/@YOURPAGE" target="_blank">TikTok</a>
    <a href="https://youtube.com/YOURCHANNEL" target="_blank">YouTube</a>
  </div>
</div>

<div class="section">
  <h2>Facebook Feed</h2>
  <iframe 
    src="https://www.facebook.com/plugins/page.php?href=https://www.facebook.com/YOURPAGE&tabs=timeline,events&width=500&height=600"
    width="500"
    height="600"
    style="border:none;overflow:hidden"
    scrolling="no"
    frameborder="0"
    allowfullscreen="true">
  </iframe>
</div>

<div class="section">
  <h2>Contact</h2>
  <p>Email us: <a href="mailto:info@yourdomain.com">info@yourdomain.com</a></p>
</div>

<footer>
  <p>© 2026 Your Brand</p>
</footer>

</body>
</html>
