<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jake Cole Music</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0d0d0d;
    color: white;
}

header {
    background: url('https://images.unsplash.com/photo-1511379938547-c1f69419868d') center/cover;
    height: 90vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

header h1 {
    font-size: 60px;
    margin: 0;
}

header p {
    font-size: 20px;
}

.btn {
    background: #1db954;
    color: white;
    padding: 12px 20px;
    margin-top: 15px;
    text-decoration: none;
    border-radius: 5px;
}

section {
    padding: 50px 20px;
    text-align: center;
}

.music iframe {
    width: 300px;
    height: 80px;
    margin: 10px;
}

.gallery img {
    width: 250px;
    margin: 10px;
    border-radius: 10px;
}

footer {
    padding: 20px;
    background: #111;
}
</style>

</head>

<body>

<header>
    <h1>Jake Cole</h1>
    <p>Country Music • Texas Raised</p>
    <a class="btn" href="#music">Listen Now</a>
</header>

<section id="about">
    <h2>About Me</h2>
    <p>
        Writing songs about real life, backroads, and good times. 
        New music dropping soon—stay tuned.
    </p>
</section>

<section id="music" class="music">
    <h2>Music</h2>
    <p>Coming soon to Spotify & Apple Music</p>

    <!-- Replace later with your real Spotify embed -->
    <iframe src="https://open.spotify.com/embed/track/7lPN2DXiMsVn7XUKtOW1CS"></iframe>
</section>

<section class="gallery">
    <h2>Photos</h2>
    <img src="https://images.unsplash.com/photo-1507874457470-272b3c8d8ee2">
    <img src="https://images.unsplash.com/photo-1497032205916-ac775f0649ae">
    <img src="https://images.unsplash.com/photo-1518600506278-4e8ef466b810">
</section>

<section>
    <h2>Follow Me</h2>
    <a class="btn" href="https://facebook.com/jakecolemusic">Facebook</a>
    <a class="btn" href="https://instagram.com/jake_cole04">Instagram</a>
</section>

<footer>
    <p>© 2026 Jake Cole Music</p>
</footer>

</body>
</html>
